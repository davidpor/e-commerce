# docker-compose.yml

services:
  db:
    image: mariadb:11
    container_name: ferreteria_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: ferreteria_b2b
      MYSQL_USER: ferreteria_user
      MYSQL_PASSWORD: ferreteria_pass
    ports:
      - "3306:3306"          # accesible desde tu PC en localhost:3306
    volumes:
      - db_data:/var/lib/mysql   # los datos persisten aunque pares el contenedor
  adminer:
    image: adminer:latest
    container_name: ferreteria_adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - db  
  redis:
    image: redis:7-alpine
    container_name: ferreteria_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  db_data:
  redis_data: