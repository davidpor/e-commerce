<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - ObraMaestra</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="login.css">
</head>
<body>

    <div class="auth-contenedor">
        <div class="auth-logo">
            <div class="logo-caja-login">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-hard-hat-icon lucide-hard-hat"><path d="M10 10V5a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1v5"/><path d="M14 6a6 6 0 0 1 6 6v3"/><path d="M4 15v-3a6 6 0 0 1 6-6"/><rect x="2" y="15" width="20" height="4" rx="1"/></svg> 
            </div> 
                <span>OBRAMAESTRA</span>
        </div>

        <div class="auth-tarjeta">
            <h2>Bienvenido de nuevo</h2>
            
            <!-- conexion para el back -->
            <form class="auth-form" id="form-login">
                
                <div class="input-grupo">
                    <label for="email">Correo electrónico</label>
                    <input type="email" id="email" name="email" placeholder="nombre@tuempresa.com" required>
                </div>

                <div class="input-grupo">
                    <label for="password">Crea una contraseña</label>
                    <div class="caja-input-password">
                        <input type="password" id="input-pass" placeholder="Ingresa tu contraseña" required>
    
                        <span class="btn-ojito" id="btn-ojito">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icono-ojo"><path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" x2="22" y1="2" y2="22"/></svg>
                        </span>
                    </div>
                </div>

                <button type="submit" class="btn-auth">Ingresar al Sistema</button>
            </form>

            <hr class="divisor">

            <div class="auth-pie">
                <p>¿Aún no tienes una cuenta de distribuidor?</p>
                <a href="registro.html">Solicitar registro de empresa</a>
            </div>
        </div>
    </div>

    <script src="password.js"></script>
    
</body>
</html>
