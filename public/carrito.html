<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrito - ObraMaestra</title>
    
    <link rel="stylesheet" href="index.css"> 
    <link rel="stylesheet" href="carrito.css">
    </head>


<body>
    <header>
        <div class="tipologo">
            <div class="caja-naranja">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-hard-hat-icon lucide-hard-hat"><path d="M10 10V5a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1v5"/><path d="M14 6a6 6 0 0 1 6 6v3"/><path d="M4 15v-3a6 6 0 0 1 6-6"/><rect x="2" y="15" width="20" height="4" rx="1"/></svg>
            </div>
            <span>OBRAMAESTRA</span>
        </div>

        <nav class="nav-principal">
            <ul class="navLinks">
                <li><a href="index.html">INICIO</a></li>
                <li><a href="catalogo.html">CATÁLOGO</a></li>    
                <li><a href="nosotros.html">NOSOTROS</a></li>  
                <li><a href="contacto.html">CONTACTO</a></li>
            </ul>
        </nav>

        <div class="user-point">

            <a href="carrito.html" style="position: relative; display: inline-block;">
                <div class="caja-shopping">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-shopping-cart-icon lucide-shopping-cart"><circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/></svg>
                </div>
                <span class="badge-carrito" id="contador-carrito">0</span>
            </a>

            <button class="btn-login" onclick="window.location.href='registro.html'">
                <div class="caja-icon-login">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-user-round-icon lucide-user-round"><circle cx="12" cy="8" r="5"/><path d="M20 21a8 8 0 0 0-16 0"/></svg>
                </div> <span class="texto-login">Ingresar</span>
            </button>


            <button class="btn-hamburguesa" id="btn-hamburguesa">
                <svg class="icono-barras" xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/> </svg>
                <svg class="icono-x" style="display: none;" xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
            </button>

        </div>
    </header>

    <!-- ---------- SEPARACION DEL HEADER ---------- -->

<main class="seccion-cotizacion">
    <div class="contenedor-cotizacion">
        
        <div class="cabecera-cotizacion">
            <h1>TU COTIZACIÓN</h1>
        </div>

        <div class="lista-items-carrito">
            
            <div class="estado-vacio">
                <div class="icono-vacio">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-shopping-cart-icon lucide-shopping-cart"><circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/></svg>
                </div>
                <h2>Tu pedido está vacío</h2>
                <p>Explora nuestro catálogo para armar tu cotización mayorista.</p>
                <a href="catalogo.html" class="btn-ver-catalogo">
                    Ver Catálogo <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/></svg>
                </a>
            </div>

        </div>

        <div class="resumen-final-carrito" style="display: none; justify-content: space-between; align-items: center; background-color: #111111; border: 1px solid #222; border-radius: 8px; padding: 25px; margin-top: 30px;">
            <div class="texto-total">
                </div>
            
            <button onclick="window.location.href='checkout.html'" class="btn-ver-catalogo" style="border: none; cursor: pointer;">
                Proceder al Pago <i class="fa-solid fa-arrow-right" style="margin-left: 10px;"></i>
            </button>
        </div>

    </div>
</main>


<!-- ---------- SEPARACION DEL FOOTER ---------- -->

    <footer class="footer-principal">
        
    </footer>

<script src="menu.js"></script>
<script src="carrito.js"></script>


</body>

</html>
