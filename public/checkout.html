<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrito - ObraMaestra</title>
    
    <link rel="stylesheet" href="index.css"> 
    <link rel="stylesheet" href="checkout.css">
    </head>


<body>
    <header>
        <div class="tipologo">
            <div class="caja-naranja">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-hard-hat-icon lucide-hard-hat"><path d="M10 10V5a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1v5"/><path d="M14 6a6 6 0 0 1 6 6v3"/><path d="M4 15v-3a6 6 0 0 1 6-6"/><rect x="2" y="15" width="20" height="4" rx="1"/></svg>
            </div>
            <span>OBRAMAESTRA</span>
        </div>

        <nav class="nav-principal">
            <ul class="navLinks">
                <li><a href="index.html">INICIO</a></li>
                <li><a href="catalogo.html">CATÁLOGO</a></li>    <!-- catalogo.php" -->
                <li><a href="nosotros.html">NOSOTROS</a></li>  <!-- index.php#sectores" -->
                <li><a href="contacto.html">CONTACTO</a></li>
            </ul>
        </nav>

        <div class="user-point">

            <a href="carrito.html" style="position: relative; display: inline-block;">
                <div class="caja-shopping">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-shopping-cart-icon lucide-shopping-cart"><circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/></svg>
                </div>
                <span class="badge-carrito" id="contador-carrito">0</span>
            </a>

            <button class="btn-login" onclick="window.location.href='registro.html'">
                <div class="caja-icon-login">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-user-round-icon lucide-user-round"><circle cx="12" cy="8" r="5"/><path d="M20 21a8 8 0 0 0-16 0"/></svg>
                </div> <span class="texto-login">Ingresar</span>
            </button>


            <button class="btn-hamburguesa" id="btn-hamburguesa">
                <svg class="icono-barras" xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/> </svg>
                <svg class="icono-x" style="display: none;" xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
            </button>

        </div>
    </header>

    <!-- ---------- SEPARACION DEL HEADER ---------- -->

<main class="seccion-checkout">
    <div class="contenedor-checkout">
        
        <div class="checkout-datos">
            <h2>Finalizar Pedido</h2>
            
            <section class="checkout-card">
                <h3><i class="fa-solid fa-file-invoice"></i> Datos de Facturación y Entrega</h3>
                <div class="grupo-campos">
                    <div class="campo">
                        <label>Razón Social / Nombre Completo</label>
                        <input type="text" value="Ferretería Central S.H." readonly>
                    </div>
                    <div class="campo">
                        <label>CUIT (Confirmado)</label>
                        <input type="text" value="30-71234567-9" readonly>
                    </div>
                    <div class="campo">
                        <label>Dirección de Despacho</label>
                        <input type="text" placeholder="Calle, Número, Localidad" required>
                    </div>
                </div>
            </section>

            <section class="checkout-card">
                <h3><i class="fa-solid fa-credit-card"></i> Método de Pago</h3>
                <div class="opciones-pago">
                    <label class="radio-pago">
                        <input type="radio" name="pago" value="tarjeta" checked>
                        <span>Tarjeta de Crédito / Débito (Simulado)</span>
                    </label>
                    <label class="radio-pago">
                        <input type="radio" name="pago" value="transferencia">
                        <span>Transferencia Bancaria (Acondicionado B2B)</span>
                    </label>
                </div>

                <div class="datos-tarjeta-simulados" id="bloque-tarjeta">
                    <div class="campo">
                        <label>Número de Tarjeta</label>
                        <input type="text" placeholder="0000 0000 0000 0000" maxlength="19">
                    </div>
                    <div class="sub-campos">
                        <div class="campo">
                            <label>Vencimiento</label>
                            <input type="text" placeholder="MM/AA" maxlength="5">
                        </div>
                        <div class="campo">
                            <label>CVC</label>
                            <input type="password" placeholder="000" maxlength="4">
                        </div>
                    </div>
                </div>
            </section>
        </div>

        <div class="checkout-resumen">
            <div class="resumen-fijo-card">
                <h3>Resumen de Compra</h3>
                <div class="linea-resumen">
                    <span>Productos (3)</span>
                    <span>$170.000</span>
                </div>
                <div class="linea-resumen">
                    <span>Logística (A coordinar)</span>
                    <span class="gratis">CONVENIR</span>
                </div>
                <hr class="divisor-resumen">
                <div class="linea-resumen total">
                    <span>Total a Pagar</span>
                    <span>$170.000</span>
                </div>
                
                <button type="submit" class="btn-confirmar-compra" id="btn-finalizar">
                    Confirmar y Pagar Pedido
                </button>
            </div>
        </div>

    </div>
</main>


<!-- ---------- SEPARACION DEL FOOTER ---------- -->

    <footer class="footer-principal">
        
    </footer>

<script src="menu.js"></script>


</body>

</html>
